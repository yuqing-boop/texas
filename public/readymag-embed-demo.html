<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texas Hold'em — parent frame demo (Readymag-style)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        background: #1a1a2e;
        color: #eee;
      }
      .hud {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
        padding: 10px;
        background: #16213e;
        border-radius: 8px;
      }
      .hud code {
        background: #0f3460;
        padding: 2px 6px;
        border-radius: 4px;
      }
      iframe {
        display: block;
        width: 100%;
        max-width: 1100px;
        height: min(85vh, 800px);
        border: 2px solid #00ffff;
        border-radius: 4px;
        background: #000;
      }
    </style>
  </head>
  <body>
    <p>
      This page simulates a Readymag parent: the iframe loads the game from the same origin so
      <code>postMessage</code> updates appear below.
    </p>
    <div class="hud">
      <span>Human chips (last <code>TEXAS_UPDATE</code>): <strong id="texas-chips">—</strong></span>
      <span>Game over: <strong id="texas-game-over">—</strong></span>
      <span>Winner: <strong id="texas-winner">—</strong></span>
    </div>
    <iframe id="texas-frame" src="./index.html" title="Texas Hold'em PC-98"></iframe>
    <script>
      (function () {
        function onMessage(event) {
          var data = event.data;
          if (!data || data.type !== 'TEXAS_UPDATE') return;
          var chips = document.getElementById('texas-chips');
          var over = document.getElementById('texas-game-over');
          var winner = document.getElementById('texas-winner');
          if (chips) chips.textContent = String(data.chipCount);
          if (over) over.textContent = data.gameOver ? 'yes' : 'no';
          if (winner) winner.textContent = data.gameOver ? (data.winner || '—') : '—';
        }
        window.addEventListener('message', onMessage);
      })();
    </script>
  </body>
</html>
